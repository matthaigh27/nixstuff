# nvfetcher source manifest for the vendored prebuilt release binaries.
#
# One entry per (package, platform): `src.github` tracks the latest release and
# `src.prefix` strips the tag's `v`/`b` so `$ver` is the bare version used in
# both the release path and the asset name. `nvfetcher` re-resolves every entry
# and prefetches each asset's hash into _sources/generated.nix — it fetches by
# URL, so a single run (on any machine / in CI) refreshes all platforms at once.
#
# The package derivations in pkgs/ pick the right entry for the build platform.

# CLIProxyAPI — https://github.com/router-for-me/CLIProxyAPI
[cli-proxy-api-aarch64-darwin]
src.github = "router-for-me/CLIProxyAPI"
src.prefix = "v"
fetch.url = "https://github.com/router-for-me/CLIProxyAPI/releases/download/v$ver/CLIProxyAPI_$ver_darwin_aarch64.tar.gz"

[cli-proxy-api-x86_64-linux]
src.github = "router-for-me/CLIProxyAPI"
src.prefix = "v"
fetch.url = "https://github.com/router-for-me/CLIProxyAPI/releases/download/v$ver/CLIProxyAPI_$ver_linux_amd64.tar.gz"

[cli-proxy-api-aarch64-linux]
src.github = "router-for-me/CLIProxyAPI"
src.prefix = "v"
fetch.url = "https://github.com/router-for-me/CLIProxyAPI/releases/download/v$ver/CLIProxyAPI_$ver_linux_aarch64.tar.gz"

# pi coding agent — https://github.com/earendil-works/pi
[pi-aarch64-darwin]
src.github = "earendil-works/pi"
src.prefix = "v"
fetch.url = "https://github.com/earendil-works/pi/releases/download/v$ver/pi-darwin-arm64.tar.gz"

[pi-aarch64-linux]
src.github = "earendil-works/pi"
src.prefix = "v"
fetch.url = "https://github.com/earendil-works/pi/releases/download/v$ver/pi-linux-arm64.tar.gz"

[pi-x86_64-linux]
src.github = "earendil-works/pi"
src.prefix = "v"
fetch.url = "https://github.com/earendil-works/pi/releases/download/v$ver/pi-linux-x64.tar.gz"

# mise — https://github.com/jdx/mise (darwin-arm64 only; Linux uses nixpkgs)
[mise-aarch64-darwin]
src.github = "jdx/mise"
src.prefix = "v"
fetch.url = "https://github.com/jdx/mise/releases/download/v$ver/mise-v$ver-macos-arm64.tar.gz"

# llama.cpp — https://github.com/ggml-org/llama.cpp (darwin-arm64 only)
[llama-cpp-aarch64-darwin]
src.github = "ggml-org/llama.cpp"
src.prefix = "b"
fetch.url = "https://github.com/ggml-org/llama.cpp/releases/download/b$ver/llama-b$ver-bin-macos-arm64.tar.gz"

# Claude Code — https://github.com/anthropics/claude-code (official native
# binary; linux uses the static musl build so no autoPatchelf is needed).
[claude-code-aarch64-darwin]
src.github = "anthropics/claude-code"
src.prefix = "v"
fetch.url = "https://github.com/anthropics/claude-code/releases/download/v$ver/claude-darwin-arm64.tar.gz"

[claude-code-aarch64-linux]
src.github = "anthropics/claude-code"
src.prefix = "v"
fetch.url = "https://github.com/anthropics/claude-code/releases/download/v$ver/claude-linux-arm64-musl.tar.gz"

[claude-code-x86_64-linux]
src.github = "anthropics/claude-code"
src.prefix = "v"
fetch.url = "https://github.com/anthropics/claude-code/releases/download/v$ver/claude-linux-x64-musl.tar.gz"

# OpenAI Codex CLI — https://github.com/openai/codex (Rust). Tags are
# `rust-v<semver>`; include_regex keeps stable releases only (skips -alpha).
# The static musl linux builds need no autoPatchelf. codex >= 0.143 also spawns
# a sibling `codex-code-mode-host` binary, shipped as its own asset — packaged
# alongside below.
[codex-aarch64-darwin]
src.github = "openai/codex"
src.prefix = "rust-v"
src.include_regex = "[0-9]+\\.[0-9]+\\.[0-9]+"
fetch.url = "https://github.com/openai/codex/releases/download/rust-v$ver/codex-aarch64-apple-darwin.tar.gz"

[codex-aarch64-linux]
src.github = "openai/codex"
src.prefix = "rust-v"
src.include_regex = "[0-9]+\\.[0-9]+\\.[0-9]+"
fetch.url = "https://github.com/openai/codex/releases/download/rust-v$ver/codex-aarch64-unknown-linux-musl.tar.gz"

[codex-x86_64-linux]
src.github = "openai/codex"
src.prefix = "rust-v"
src.include_regex = "[0-9]+\\.[0-9]+\\.[0-9]+"
fetch.url = "https://github.com/openai/codex/releases/download/rust-v$ver/codex-x86_64-unknown-linux-musl.tar.gz"

[codex-code-mode-host-aarch64-darwin]
src.github = "openai/codex"
src.prefix = "rust-v"
src.include_regex = "[0-9]+\\.[0-9]+\\.[0-9]+"
fetch.url = "https://github.com/openai/codex/releases/download/rust-v$ver/codex-code-mode-host-aarch64-apple-darwin.tar.gz"

[codex-code-mode-host-aarch64-linux]
src.github = "openai/codex"
src.prefix = "rust-v"
src.include_regex = "[0-9]+\\.[0-9]+\\.[0-9]+"
fetch.url = "https://github.com/openai/codex/releases/download/rust-v$ver/codex-code-mode-host-aarch64-unknown-linux-musl.tar.gz"

[codex-code-mode-host-x86_64-linux]
src.github = "openai/codex"
src.prefix = "rust-v"
src.include_regex = "[0-9]+\\.[0-9]+\\.[0-9]+"
fetch.url = "https://github.com/openai/codex/releases/download/rust-v$ver/codex-code-mode-host-x86_64-unknown-linux-musl.tar.gz"

# Zed (preview channel) — https://github.com/zed-industries/zed. The github
# source can't see the preview channel (it skips prereleases), so we read the
# version straight out of the redirect that zed.dev's "latest preview" endpoint
# issues (Location: .../download/v<ver>/...). Linux x86_64 only, matching the
# old zed-preview-src input; repacked by pkgs/zed-preview.nix.
[zed-preview-x86_64-linux]
src.httpheader = "https://zed.dev/api/releases/preview/latest/zed-linux-x86_64.tar.gz"
src.regex = "download/v([^/]+)/"
fetch.url = "https://github.com/zed-industries/zed/releases/download/v$ver/zed-linux-x86_64.tar.gz"
