name: update-vendored-sources

# Re-resolve every vendored package to its latest upstream release and commit
# the bumped hashes. Runs daily and on demand. The consuming flake (nixfiles)
# then picks the bumps up with a normal `nix flake update`.
on:
  schedule:
    # Times are UTC. AEST = UTC+10 year-round (no daylight saving here).
    - cron: "17 20 * * *" # 06:17 AEST
    - cron: "17 3 * * *"  # 13:17 AEST
  workflow_dispatch:

concurrency:
  group: update-vendored-sources
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      # nvchecker reads its GitHub token from a keyfile, not $GITHUB_TOKEN, so
      # write one from the Actions token (5000 req/hr vs 60 unauthenticated).
      - name: Run nvfetcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          umask 077
          printf '[keys]\ngithub = "%s"\n' "$GH_TOKEN" > "$RUNNER_TEMP/keys.toml"
          nix run nixpkgs#nvfetcher -- --keyfile "$RUNNER_TEMP/keys.toml"

      # Build the Linux packages on this Linux runner so a bad bump (e.g. a
      # renamed/missing asset or an autoPatchelf regression) fails the job before
      # it can be committed. The darwin packages can't be built here.
      - name: Build Linux packages
        run: |
          nix build --no-link --print-out-paths \
            '.#packages.x86_64-linux.pi' \
            '.#packages.x86_64-linux.cli-proxy-api' \
            '.#packages.x86_64-linux.codex' \
            '.#packages.x86_64-linux.claude-code' \
            '.#packages.x86_64-linux.zed-editor-preview'

      - name: Commit bumps
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No source changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(sources): update vendored packages to latest upstream"
          git push
